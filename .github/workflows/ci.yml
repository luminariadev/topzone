name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily E2E health check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npx astro check || true  # Type check (non-blocking)
      - run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Build (for E2E)
        run: npm run build
      - name: Start preview server
        run: |
          npm run serve &
          npx wait-on http://localhost:4321
      - name: Run E2E tests
        run: npm run e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4321
      - name: Stop preview server
        if: always()
        run: kill $(lsof -ti:4321) || true

  build-and-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle Analysis
        run: node scripts/bundle-analyze.js
        continue-on-error: true
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --collect.staticDistDir=./dist --collect.url=https://topzone.vercel.app --assert.presets=lighthouse:recommended --upload.target=temporary-public-storage || echo "Lighthouse CI non-blocking"
        continue-on-error: true

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: [lint-and-typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          vercel-args: '--prebuilt'
