<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generate placeholder images</title>
  <style>body { font-family: sans-serif; padding: 20px; } .card { display:inline-block; border:1px solid #ddd; padding:10px; margin:5px; width:200px; }</style>
</head>
<body>
  <h1>Click each card to download the SVG as PNG</h1>
  <div id="cards"></div>
  <script>
    const items = [
      { name: 'gaming-chair', emoji: '🪑', color: '#FF007F' },
      { name: 'controller', emoji: '🎮', color: '#39FF14' },
      { name: 'webcam', emoji: '📷', color: '#4FC1E9' },
      { name: 'microphone', emoji: '🎤', color: '#9B59B6' },
      { name: 'gaming-chair-rgb', emoji: '🪑', color: '#FF007F' },
      { name: 'gaming-chair-budget', emoji: '🪑', color: '#FF8C00' },
      { name: 'racing-chair', emoji: '🏎️', color: '#FF4444' },
      { name: 'ergo-chair', emoji: '🪑', color: '#34A853' },
      { name: 'monitor-144hz', emoji: '🖥️', color: '#1E90FF' },
      { name: 'monitor-2k', emoji: '🖥️', color: '#FFD700' },
      { name: 'monitor-4k', emoji: '🖥️', color: '#9B59B6' },
      { name: 'ultrawide-monitor', emoji: '🖥️', color: '#4FC1E9' },
      { name: 'portable-monitor', emoji: '💻', color: '#FF8C00' },
      { name: 'ps5-controller', emoji: '🎮', color: '#003087' },
      { name: 'switch-pro', emoji: '🎮', color: '#E60012' },
      { name: 'mobile-gamepad', emoji: '📱', color: '#39FF14' },
      { name: 'fight-stick', emoji: '🕹️', color: '#E74C3C' },
      { name: 'webcam-1080p', emoji: '📷', color: '#2ECC71' },
      { name: 'streaming-cam', emoji: '🎥', color: '#E67E22' },
      { name: 'usb-mic', emoji: '🎤', color: '#8E44AD' },
      { name: 'lavalier-mic', emoji: '🎙️', color: '#3498DB' },
      { name: 'mousepad-xl', emoji: '🔲', color: '#34495E' },
      { name: 'mousepad-rgb', emoji: '🌈', color: '#FF007F' },
      { name: 'mousepad-hard', emoji: '⬛', color: '#1A1A2E' },
      { name: 'mousepad-wrist', emoji: '🩹', color: '#2ECC71' },
      { name: 'mousepad-mini', emoji: '🔲', color: '#7F8C8D' },
      { name: 'speaker-stereo', emoji: '🔊', color: '#E74C3C' },
      { name: 'speaker-2-1', emoji: '🔊', color: '#8E44AD' },
      { name: 'soundbar', emoji: '🔊', color: '#FF007F' },
      { name: 'capture-card', emoji: '📼', color: '#1E90FF' },
      { name: 'ring-light', emoji: '💡', color: '#FFD700' },
      { name: 'green-screen', emoji: '🟩', color: '#2ECC71' },
      { name: 'stream-deck', emoji: '🎛️', color: '#2C3E50' },
      { name: 'boom-arm', emoji: '🦾', color: '#E67E22' },
    ];
    const el = document.getElementById('cards');
    items.forEach(({name, emoji, color}) => {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
        <rect width="400" height="400" fill="${color}" rx="16"/>
        <text x="200" y="160" text-anchor="middle" font-size="80">${emoji}</text>
        <text x="200" y="260" text-anchor="middle" fill="white" font-family="Arial Black, sans-serif" font-size="24" font-weight="900">${name}</text>
        <text x="200" y="300" text-anchor="middle" fill="white" font-family="Arial" font-size="14" opacity="0.7">topzone.id</text>
      </svg>`;
      const blob = new Blob([svg], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img src="${url}" width="180" style="border-radius:8px"/><br><small>${name}</small><br><a href="${url}" download="${name}.svg">Download SVG</a> | <button onclick="downloadPNG(this)" data-svg="${btoa(svg)}" data-name="${name}">Download PNG</button>`;
      el.appendChild(card);
    });
    function downloadPNG(btn){
      const svg = atob(btn.dataset.svg);
      const canvas = document.createElement('canvas');
      canvas.width = 400; canvas.height = 400;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, 400, 400);
        const link = document.createElement('a');
        link.download = btn.dataset.name + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      img.src = 'data:image/svg+xml;base64,' + btoa(svg);
    }
  </script>
</body>
</html>
